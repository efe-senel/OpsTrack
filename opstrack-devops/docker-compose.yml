services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opstrack}
      POSTGRES_USER: ${POSTGRES_USER:-opstrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opstrack_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-opstrack}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-opstrack}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
    networks:
      - opstrack_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - opstrack_network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:-./nginx/certs/certificate.crt}:/etc/nginx/tls/certificate.crt:ro
      - ${TLS_KEY_PATH:-./nginx/certs/private.key}:/etc/nginx/tls/private.key:ro
    networks:
      - opstrack_network
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: opstrack_postgres_data

networks:
  opstrack_network:
    name: opstrack_network
    driver: bridge
