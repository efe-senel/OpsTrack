spring.application.name=OpsTrack

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opstrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:opstrack}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:opstrack}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
